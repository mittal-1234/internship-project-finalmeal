{% extends "delivery/base.html" %}

{% block title %}Sign Up - Meal Buddy{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 0 auto;">
    <div class="card" style="padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fas fa-user-plus" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <h1 style="margin: 0 0 0.5rem;">Join Meal Buddy</h1>
            <p style="color: var(--text-secondary);">Create an account to get started</p>
        </div>

        <form action="{% url 'signup' %}" method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>

            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="mobile"><i class="fas fa-phone"></i> Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" placeholder="+91 XXXXXXXXXX" required>
            </div>

            <div class="form-group">
                <label for="address"><i class="fas fa-map-marker-alt"></i> Delivery Address</label>
                <textarea id="address" name="address" placeholder="Enter your full delivery address" required></textarea>
            </div>

            <button type="submit" class="btn-primary btn-block" style="padding: 14px; font-size: 1rem; margin-top: 0.5rem;">
                <i class="fas fa-check"></i> Create Account
            </button>
        </form>

        <div style="margin-top: 2rem; text-align: center; padding-top: 2rem; border-top: 1px solid var(--border);">
            <p style="color: var(--text-secondary); margin: 0;">Already have an account? <a href="{% url 'open_signin' %}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
