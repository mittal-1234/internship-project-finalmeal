{% extends "delivery/base.html" %}

{% block title %}Sign Up - FinalMeal{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px;">
    <h2>SIGN UP below:</h2>

    <form action="{% url 'signup' %}" method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
            <label for="mobile">Mobile</label>
            <input type="text" id="mobile" name="mobile" placeholder="Your mobile number" required>
        </div>

        <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" style="padding: 1rem; border-radius: 12px; border: 1px solid #E0E0E0; font-family: inherit; min-height: 100px;" placeholder="Your delivery address" required></textarea>
        </div>

        <button type="submit">SIGN UP</button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        <p>Already have an account? <a href="{% url 'open_signin' %}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign In</a></p>
    </div>
</div>
{% endblock %}
