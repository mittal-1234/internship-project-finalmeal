{% extends "delivery/base.html" %}

{% block title %}Add New Restaurant - FinalMeal{% endblock %}

{% block content %}
<div class="card">
    <h2>Add New Restaurant</h2>
    <form action="{% url 'add_restaurant' %}" method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="name">Restaurant Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Gourmet Bistro" required>
        </div>

        <div class="form-group">
            <label for="picture">Picture URL</label>
            <input type="url" id="picture" name="picture" placeholder="https://..." required>
        </div>

        <div class="form-group">
            <label for="cuisine">Cuisine</label>
            <input type="text" id="cuisine" name="cuisine" placeholder="e.g. Italian, Japanese" required>
        </div>

        <div class="form-group">
            <label for="rating">Rating (0-5)</label>
            <input type="number" id="rating" name="rating" min="0" max="5" step="0.5" value="4.5" required>
        </div>

        <button type="submit">Add Restaurant</button>
    </form>
</div>
{% endblock %}
