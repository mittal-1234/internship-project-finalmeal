{% extends "delivery/base.html" %}

{% block title %}Sign In - Meal Buddy{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 0 auto;">
    <div class="card" style="padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fas fa-sign-in-alt" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 1rem;"></i>
            <h1 style="margin: 0 0 0.5rem;">Welcome Back</h1>
            <p style="color: var(--text-secondary);">Sign in to your Meal Buddy account</p>
        </div>

        <form action="{% url 'signin' %}" method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn-primary btn-block" style="padding: 14px; font-size: 1rem; margin-top: 0.5rem;">
                <i class="fas fa-arrow-right"></i> Sign In
            </button>
        </form>

        <div style="margin-top: 2rem; text-align: center; padding-top: 2rem; border-top: 1px solid var(--border);">
            <p style="color: var(--text-secondary); margin: 0;">Don't have an account? <a href="{% url 'open_signup' %}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create one</a></p>
        </div>
    </div>
</div>
{% endblock %}
