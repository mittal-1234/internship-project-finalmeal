{% extends "delivery/base.html" %}
{% block title %}My Restaurants{% endblock %}
{% block content %}
<h2>🏪 My Restaurants</h2>

<div class="cards-grid">
  {% for r in restaurantList %}
  <div class="card">
    <img src="{{ r.picture }}" alt="{{ r.name }}" class="card-image">
    <div class="card-body">
      <h3 class="card-title">{{ r.name }}</h3>
      <div class="card-subtitle">
        <span>🍽️ {{ r.cuisine }}</span>
        <span>⭐ {{ r.rating }}</span>
      </div>
      <div class="card-actions">
        <a href="{% url 'open_update_restaurant' r.id %}" class="button" style="background: linear-gradient(135deg, #4d8cf6, #5fc3ff); flex: 1;">Edit Info</a>
        <a href="{% url 'open_update_menu' r.id %}" class="button" style="background: linear-gradient(135deg, #ffa502, #ffb84d); flex: 1;">Edit Menu</a>
      </div>
      <a href="{% url 'delete_restaurant' r.id %}" class="button" style="background: linear-gradient(135deg, #ee5a6f, #f26a5e); width: 100%; margin-top: 8px;">Delete</a>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
